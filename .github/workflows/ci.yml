name: ci

on:
  push:
    branches:
      - main
      - "lavender/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build output
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --locked

  release-package-smoke:
    name: release package smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release archive
        run: scripts/package-release.sh

      - name: Verify archive checksum and native entrypoints
        shell: bash
        run: |
          set -euo pipefail

          archive="$(find dist -maxdepth 1 -name 'gh-forgejo-shim-*.tar.gz' -print -quit)"
          checksum="${archive}.sha256"
          checksum_dir="$(dirname "$checksum")"
          checksum_file="$(basename "$checksum")"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$checksum_dir" && sha256sum -c "$checksum_file")
          else
            (cd "$checksum_dir" && shasum -a 256 -c "$checksum_file")
          fi

          mkdir -p dist/smoke-install
          tar -xzf "$archive" -C dist/smoke-install

          dist/smoke-install/gfj --version
          dist/smoke-install/gh-forgejo-shim --help

          set +e
          output="$(dist/smoke-install/gfj doctor 2>&1)"
          status="$?"
          set -e

          printf '%s\n' "$output"
          test "$status" -eq 0 -o "$status" -eq 1
          printf '%s\n' "$output" | grep -F "gh-forgejo-shim doctor"

          real_bin="$(mktemp -d)"
          shim_bin="$(mktemp -d)"
          cat > "$real_bin/gh" <<'EOF'
          #!/usr/bin/env sh
          printf '%s\n' 'gh version 9.9.9 (ci fake)'
          EOF
          chmod +x "$real_bin/gh"

          dist/smoke-install/gfj install-shim --bin-dir "$shim_bin"
          test -x "$shim_bin/gh"
          if grep -Eiq 'python|pipx' "$shim_bin/gh"; then
            sed -n '1,20p' "$shim_bin/gh" >&2
            exit 1
          fi
          test "$(PATH="$shim_bin:$real_bin:$PATH" command -v gh)" = "$shim_bin/gh"
          test "$(PATH="$shim_bin:$real_bin:$PATH" FJ_SHIM_REAL_GH="$real_bin/gh" gh --version)" = "gh version 9.9.9 (ci fake)"
