name: ci

on:
  push:
    branches:
      - main
      - "lavender/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PYTHONPATH: src

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build output
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run Rust tests
        run: cargo test --workspace --locked

  python-legacy:
    name: python legacy (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run legacy Python tests
        run: python -m unittest

      - name: Compile Python sources
        run: python -m compileall -q src tests

  release-package-smoke:
    name: release package smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release archive
        run: scripts/package-release.sh

      - name: Verify archive checksum and native doctor entrypoint
        shell: bash
        run: |
          set -euo pipefail

          archive="$(find dist -maxdepth 1 -name 'gh-forgejo-shim-*.tar.gz' -print -quit)"
          checksum="${archive}.sha256"
          checksum_dir="$(dirname "$checksum")"
          checksum_file="$(basename "$checksum")"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$checksum_dir" && sha256sum -c "$checksum_file")
          else
            (cd "$checksum_dir" && shasum -a 256 -c "$checksum_file")
          fi

          mkdir -p dist/smoke-install
          tar -xzf "$archive" -C dist/smoke-install

          dist/smoke-install/gfj --version

          set +e
          output="$(dist/smoke-install/gfj doctor 2>&1)"
          status="$?"
          set -e

          printf '%s\n' "$output"
          test "$status" -eq 0 -o "$status" -eq 1
          printf '%s\n' "$output" | grep -F "gh-forgejo-shim doctor"
