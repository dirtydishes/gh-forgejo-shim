name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-artifacts:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build output
        uses: Swatinem/rust-cache@v2

      - name: Package release archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          archive="$(scripts/package-release.sh "${{ matrix.target }}")"
          checksum="${archive}.sha256"
          {
            echo "archive=${archive}"
            echo "checksum=${checksum}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify checksum and smoke test gfj doctor from archive
        env:
          ARCHIVE: ${{ steps.package.outputs.archive }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail

          checksum_dir="$(dirname "$CHECKSUM")"
          checksum_file="$(basename "$CHECKSUM")"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$checksum_dir" && sha256sum -c "$checksum_file")
          else
            (cd "$checksum_dir" && shasum -a 256 -c "$checksum_file")
          fi

          smoke_dir="$(mktemp -d)"
          tar -xzf "$ARCHIVE" -C "$smoke_dir"
          "$smoke_dir/gfj" --version

          set +e
          "$smoke_dir/gfj" doctor > "$smoke_dir/doctor.out" 2>&1
          status=$?
          set -e

          cat "$smoke_dir/doctor.out"
          grep -q "gh-forgejo-shim doctor" "$smoke_dir/doctor.out"

          if [[ "$status" -gt 1 ]]; then
            echo "gfj doctor exited with unexpected status ${status}" >&2
            exit "$status"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-forgejo-shim-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

  publish-release:
    name: publish release
    runs-on: ubuntu-24.04
    needs: build-artifacts
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          for checksum in *.sha256; do
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum -c "$checksum"
            else
              shasum -a 256 -c "$checksum"
            fi
          done
          cat ./*.sha256 | sort -k2 > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "$GITHUB_REF_NAME" \
              --notes "Rust-first gh-forgejo-shim release artifacts." \
              --verify-tag
          fi
